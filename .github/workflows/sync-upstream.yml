name: Sync upstream

on:
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/orhogi/streamerREC.git
          git fetch upstream main

      - name: Sync upstream/main into main
        run: |
          git checkout main
          git merge --ff-only upstream/main || {
            echo "Fast-forward failed, trying normal merge..."
            git merge upstream/main -m "chore: sync upstream"
          }

      - name: Push changes
        run: |
          git push origin main
