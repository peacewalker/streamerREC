name: Sync upstream and build image

on:
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: streamerrec

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/orhogi/streamerREC.git
          git fetch origin main
          git fetch upstream main

      - name: Check whether upstream has new commits
        id: check
        run: |
          LOCAL_SHA=$(git rev-parse origin/main)
          UPSTREAM_SHA=$(git rev-parse upstream/main)

          echo "local=$LOCAL_SHA"
          echo "upstream=$UPSTREAM_SHA"

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync upstream/main into main
        if: steps.check.outputs.updated == 'true'
        run: |
          git checkout main
          git merge --ff-only upstream/main || git merge upstream/main -m "chore: sync upstream"
          git push origin main

  docker:
    needs: sync
    if: needs.sync.outputs.updated == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout updated code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value=arm64

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
